<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นามบัตรออนไลน์ของฉัน</title>
 
  <!-- Google Fonts: Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
 
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="card">
    <!-- รูปโปรไฟล์ GitHub พร้อมขอบสีแดงตามรูปภาพ -->
    <div class="card__avatar-container">
      <img class="card__avatar" src="https://avatars.githubusercontent.com/u/9919?v=4" alt="รูปโปรไฟล์">
    </div>

    <h1 class="card__name">wittawas Bunsaenyou</h1>
    <p class="card__title">นักศึกษาวิศวกรรมคอมพิวเตอร์</p>
    <p class="card__bio">กำลังเรียนรู้ Full-stack Development และ DevOps</p>
 
    <ul class="card__links">
      <li><a href="https://github.com/wittawasbu-cyber" target="_blank">GitHub</a></li>
      <li><a href="mailto:wittawas.bu@ksu.ac.th">Email</a></li>
    </ul>
 
    <!-- ปุ่มโหมดกลางคืน (สีแดง) -->
    <button id="theme-toggle" class="card__button">🌙 โหมดกลางคืน</button>
 
    <!-- ข้อความระบุลิขสิทธิ์ -->
    <footer id="card-footer" class="card__footer">
      © 2026 — Deploy ด้วย GitHub Pages 🚀
    </footer>

    <!-- ปุ่มขณะนี้เวลา -->
    <button id="time-btn" class="card__button card__button--large">ขณะนี้เวลา</button>

    <!-- ส่วนรับข้อมูลกล่องพิมพ์ชื่อด้านล่าง -->
    <div class="card__input-group">
      <label for="name-input" class="card__input-label">ลองพิมพ์ชื่อของคุณที่นี่:</label>
      <input type="text" id="name-input" class="card__input" placeholder="ข้อความของคุณ">
    </div>
  </main>
 
  <script src="./script.js"></script>
</body>
</html>
