<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นามบัตรออนไลน์ของฉัน</title>
 
  <!-- Google Fonts: Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
 
  <!-- CSS ภายนอก: สังเกตว่าเป็น relative path (./) -->
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="card">
    <img class="card__avatar" src="https://avatars.githubusercontent.com/u/9919?v=4" alt="รูปโปรไฟล์">
    <!-- เปลียนชื่อสลุนตามที่ต้องการ -->
    <h1 id="profile-name" class="card__name">ชื่อ สกุล</h1> 
    
    <p class="card__title">นักศึกษาวิศวกรรมคอมพิวเตอร์</p>
    <p class="card__bio">กำลังเรียนรู้ Full-stack Development และ DevOps</p>
 
    <ul class="card__links">
      <li><a href="https://github.com/wittawasbu-cyber" target="_blank">GitHub</a></li>
      <li><a href="mailto:wittawas.bu@ksu.ac.th">Email</a></li>
    </ul>

 
    <button id="theme-toggle" class="card__button">🌙 โหมดกลางคืน</button>
<!-- เพิ่มปุ่มและข้อความแสดงเวลาตรงนี้ -->
    <div style="margin: 15px 0;">
      <button id="time-btn" class="card__button card__button--large" style="background-color: #c9302c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">ขณะนี้เวลา</button>
      <p id="time-display" style="margin-top: 10px; font-size: 18px; font-weight: 700; color: #1a202c; display: none;">ขณะนี้เวลา: <span id="time-text"></span></p>
    </div>
    <!-- งาน3 -->
    <div style="margin: 15px 0; width: 100%;">
      <input type="text" id="name-input" class="textinput" placeholder="พิมพ์ชื่อใหม่เพื่อเปลี่ยนชื่อ...">
    </div>  
    <!-- จบงาน3 -->
 
    <footer id="card-footer" class="card__footer"></footer>
  </main>
 
  <!-- JS ภายนอก: วางท้าย body เสมอ -->
  <script src="./script.js"></script>
</body>
</html>
